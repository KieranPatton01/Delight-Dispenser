<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Delight Dispenser</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#c9a84c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Delights" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8d5a3;
      --gold-dim: rgba(201, 168, 76, 0.15);
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --text: #f0ead6;
      --text-dim: rgba(240, 234, 214, 0.5);
      --radius: 16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 40px);
    }

    /* Header */
    .header {
      width: 100%;
      padding: 48px 24px 24px;
      text-align: center;
      position: relative;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 1px;
      background: var(--gold);
      opacity: 0.4;
    }

    .header-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.8;
      margin-bottom: 10px;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(26px, 6vw, 34px);
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .header h1 span {
      font-style: italic;
      color: var(--gold);
    }

    /* Main content area */
    .main {
      flex: 1;
      width: 100%;
      max-width: 480px;
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* State: loading */
    .state-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-top: 60px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--gold-dim);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* State: no card */
    .state-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      margin-top: 40px;
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    .empty-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--gold-dim);
      border: 1px solid rgba(201, 168, 76, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .empty-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--text);
    }

    .empty-sub {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.6;
      max-width: 260px;
    }

    /* Request button */
    .btn-request {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 14px 32px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-request::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
      z-index: -1;
    }

    .btn-request:hover::before,
    .btn-request:active::before {
      transform: scaleX(1);
    }

    .btn-request:hover,
    .btn-request:active {
      color: var(--bg);
    }

    .btn-request:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Pending request state */
    .pending-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--gold-dim);
      border: 1px solid rgba(201, 168, 76, 0.25);
      border-radius: 50px;
      padding: 12px 20px;
      font-size: 13px;
      color: var(--gold-light);
    }

    .pending-dot {
      width: 8px;
      height: 8px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* Scratch card */
    .scratch-card-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeIn 0.6s ease;
    }

    .scratch-card-label {
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
    }

    .card-container {
      position: relative;
      width: 100%;
      max-width: 340px;
      aspect-ratio: 3/4;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(201, 168, 76, 0.2),
        0 20px 60px rgba(0, 0, 0, 0.6),
        0 0 40px rgba(201, 168, 76, 0.05);
    }

    /* Reveal layer (behind canvas) */
    .card-reveal {
      position: absolute;
      inset: 0;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      gap: 20px;
      text-align: center;
      z-index: 1;
    }

    .reveal-type-badge {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
    }

    .reveal-content {
      font-family: 'Playfair Display', serif;
      font-size: clamp(18px, 4.5vw, 22px);
      font-weight: 400;
      font-style: italic;
      line-height: 1.5;
      color: var(--text);
    }

    .reveal-decoration {
      width: 30px;
      height: 1px;
      background: var(--gold);
      opacity: 0.4;
    }

    /* Scratch canvas (on top) */
    #scratchCanvas {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      touch-action: none;
      border-radius: var(--radius);
      transition: opacity 0.8s ease;
    }

    #scratchCanvas.revealed {
      opacity: 0;
      pointer-events: none;
    }

    .scratch-hint {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
    }

    /* Revealed state overlay */
    .revealed-badge {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold);
    }

    .revealed-badge.show {
      display: flex;
    }

    /* History */
    .history-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .history-title {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: center;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .history-item {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: slideUp 0.4s ease;
    }

    .history-item-type {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.6;
    }

    .history-item-content {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-style: italic;
      color: var(--text);
      line-height: 1.4;
    }

    .history-item-date {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* Divider */
    .divider {
      width: 1px;
      height: 24px;
      background: rgba(201, 168, 76, 0.2);
      align-self: center;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Confetti burst (simple) */
    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      width: 8px;
      height: 8px;
      top: -10px;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* Hidden utility */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-label">For Isla</div>
    <h1>Delight <span>Dispenser</span></h1>
  </div>

  <!-- Main -->
  <main class="main" id="main">

    <!-- Loading state -->
    <div class="state-loading" id="stateLoading">
      <div class="spinner"></div>
      <div style="font-size:13px; color: var(--text-dim);">Loading your delights…</div>
    </div>

    <!-- Scratch card (shown when a card is available) -->
    <div class="scratch-card-wrap hidden" id="scratchWrap">
      <div class="scratch-card-label">Your Delight Awaits</div>
      <div class="card-container" id="cardContainer">
        <!-- Reveal layer -->
        <div class="card-reveal" id="cardReveal">
          <div class="reveal-decoration"></div>
          <div class="reveal-type-badge" id="revealType">Compliment</div>
          <div class="reveal-content" id="revealContent">Something wonderful is waiting for you here.</div>
          <div class="reveal-decoration"></div>
        </div>
        <!-- Scratch canvas -->
        <canvas id="scratchCanvas"></canvas>
      </div>
      <div class="scratch-hint" id="scratchHint">Use your finger to scratch and reveal</div>
      <div class="revealed-badge" id="revealedBadge">
        <span style="color: var(--gold); font-size: 16px;">✦</span>
        Revealed
      </div>
    </div>

    <!-- Empty state (no card available) -->
    <div class="state-empty hidden" id="stateEmpty">
      <div class="empty-icon">✦</div>
      <div class="empty-title">No delight yet</div>
      <div class="empty-sub">Ask Kieran to send you something special.</div>
      <!-- Request button (shown if no pending request) -->
      <button class="btn-request hidden" id="btnRequest" onclick="sendRequest()">
        Request a Delight
      </button>
      <!-- Pending pill (shown while request is pending) -->
      <div class="pending-pill hidden" id="pendingPill">
        <div class="pending-dot"></div>
        Kieran is preparing something…
      </div>
    </div>

  </main>

  <!-- History section (always shown if there are revealed cards) -->
  <div class="main" style="padding-top: 0;" id="historyArea">
    <div class="history-section hidden" id="historySection">
      <div class="divider"></div>
      <div class="history-title">Past Delights</div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <!-- Confetti container -->
  <div class="confetti-container" id="confettiContainer"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    // ─── Firebase ─────────────────────────────────────────────────────────────
    const db = firebase.firestore();

    // ─── State ────────────────────────────────────────────────────────────────
    let currentCardId = null;
    let isFullyRevealed = false;
    let scratchCtx = null;
    let isScratching = false;
    let revealCheckInterval = null;

    // ─── DOM refs ─────────────────────────────────────────────────────────────
    const stateLoading   = document.getElementById('stateLoading');
    const stateEmpty     = document.getElementById('stateEmpty');
    const scratchWrap    = document.getElementById('scratchWrap');
    const scratchCanvas  = document.getElementById('scratchCanvas');
    const cardContainer  = document.getElementById('cardContainer');
    const revealContent  = document.getElementById('revealContent');
    const revealType     = document.getElementById('revealType');
    const scratchHint    = document.getElementById('scratchHint');
    const revealedBadge  = document.getElementById('revealedBadge');
    const btnRequest     = document.getElementById('btnRequest');
    const pendingPill    = document.getElementById('pendingPill');
    const historySection = document.getElementById('historySection');
    const historyList    = document.getElementById('historyList');

    function hide(el) { el.classList.add('hidden'); }
    function show(el) { el.classList.remove('hidden'); }

    // ─── Firestore listeners ──────────────────────────────────────────────────
    function startListening() {
      // Listen for an available card
      db.collection('cards')
        .where('status', '==', 'available')
        .limit(1)
        .onSnapshot(snapshot => {
          hide(stateLoading);

          if (!snapshot.empty) {
            const doc = snapshot.docs[0];
            showScratchCard(doc.id, doc.data());
          } else {
            showEmptyState();
          }
        });

      // Listen for request status
      db.collection('config').doc('app').onSnapshot(doc => {
        const data = doc.data() || {};
        if (data.requestPending) {
          hide(btnRequest);
          show(pendingPill);
        } else {
          show(btnRequest);
          hide(pendingPill);
        }
      });

      // Listen for revealed cards (history)
      db.collection('cards')
        .where('status', '==', 'revealed')
        .orderBy('revealedAt', 'desc')
        .onSnapshot(snapshot => {
          historyList.innerHTML = '';
          if (!snapshot.empty) {
            show(historySection);
            snapshot.forEach(doc => {
              const d = doc.data();
              const item = document.createElement('div');
              item.className = 'history-item';
              const date = d.revealedAt ? d.revealedAt.toDate().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) : '';
              item.innerHTML = `
                <div class="history-item-type">${d.type === 'date' ? 'Date Idea' : 'Compliment'}</div>
                <div class="history-item-content">${d.content}</div>
                <div class="history-item-date">${date}</div>
              `;
              historyList.appendChild(item);
            });
          } else {
            hide(historySection);
          }
        });
    }

    // ─── Show scratch card ────────────────────────────────────────────────────
    function showScratchCard(id, data) {
      // Only reinitialise if it's a new card
      if (currentCardId === id && !scratchWrap.classList.contains('hidden')) return;

      currentCardId = id;
      isFullyRevealed = false;

      hide(stateEmpty);
      show(scratchWrap);

      revealContent.textContent = data.content || '';
      revealType.textContent = data.type === 'date' ? 'Date Idea' : 'Compliment';

      scratchCanvas.classList.remove('revealed');
      show(scratchHint);
      hide(revealedBadge);

      initCanvas();
    }

    // ─── Show empty state ─────────────────────────────────────────────────────
    function showEmptyState() {
      currentCardId = null;
      isFullyRevealed = false;

      hide(scratchWrap);
      show(stateEmpty);
    }

    // ─── Canvas init ──────────────────────────────────────────────────────────
    function initCanvas() {
      if (revealCheckInterval) clearInterval(revealCheckInterval);

      // Size canvas to match display size
      const rect = cardContainer.getBoundingClientRect();
      scratchCanvas.width  = rect.width  || 340;
      scratchCanvas.height = rect.height || 453;

      scratchCtx = scratchCanvas.getContext('2d');

      // Draw gold foil surface
      drawScratchSurface();

      // Attach events
      scratchCanvas.addEventListener('mousedown',  onDown);
      scratchCanvas.addEventListener('mousemove',  onMove);
      scratchCanvas.addEventListener('mouseup',    onUp);
      scratchCanvas.addEventListener('mouseleave', onUp);
      scratchCanvas.addEventListener('touchstart', onTouchStart, { passive: false });
      scratchCanvas.addEventListener('touchmove',  onTouchMove,  { passive: false });
      scratchCanvas.addEventListener('touchend',   onUp);

      // Periodically check reveal %
      revealCheckInterval = setInterval(checkRevealPercentage, 300);
    }

    function drawScratchSurface() {
      const w = scratchCanvas.width;
      const h = scratchCanvas.height;

      // Gold gradient
      const grad = scratchCtx.createLinearGradient(0, 0, w, h);
      grad.addColorStop(0,    '#8b6914');
      grad.addColorStop(0.25, '#c9a84c');
      grad.addColorStop(0.5,  '#e8d5a3');
      grad.addColorStop(0.75, '#c9a84c');
      grad.addColorStop(1,    '#8b6914');

      scratchCtx.fillStyle = grad;
      scratchCtx.fillRect(0, 0, w, h);

      // Subtle texture overlay
      scratchCtx.fillStyle = 'rgba(0,0,0,0.08)';
      for (let y = 0; y < h; y += 4) {
        scratchCtx.fillRect(0, y, w, 1);
      }

      // "Scratch Here" text repeated as pattern
      scratchCtx.fillStyle = 'rgba(0,0,0,0.18)';
      scratchCtx.font = '12px DM Sans';
      scratchCtx.textAlign = 'center';
      for (let row = 0; row < 12; row++) {
        for (let col = 0; col < 4; col++) {
          scratchCtx.save();
          scratchCtx.translate(col * (w / 3) + 40, row * 44 + 30);
          scratchCtx.rotate(-0.3);
          scratchCtx.fillText('✦ scratch', 0, 0);
          scratchCtx.restore();
        }
      }

      // Central prompt
      scratchCtx.fillStyle = 'rgba(0,0,0,0.35)';
      scratchCtx.font = '600 14px DM Sans';
      scratchCtx.textAlign = 'center';
      scratchCtx.fillText('scratch to reveal', w / 2, h / 2);
    }

    // ─── Scratch helpers ──────────────────────────────────────────────────────
    function getCanvasPos(e) {
      const rect = scratchCanvas.getBoundingClientRect();
      const scaleX = scratchCanvas.width  / rect.width;
      const scaleY = scratchCanvas.height / rect.height;
      const src = e.touches ? e.touches[0] : e;
      return {
        x: (src.clientX - rect.left) * scaleX,
        y: (src.clientY - rect.top)  * scaleY
      };
    }

    function scratchAt(x, y) {
      if (isFullyRevealed) return;
      scratchCtx.globalCompositeOperation = 'destination-out';
      scratchCtx.beginPath();
      scratchCtx.arc(x, y, 36, 0, Math.PI * 2);
      scratchCtx.fill();
    }

    function onDown(e)  { isScratching = true; const p = getCanvasPos(e); scratchAt(p.x, p.y); }
    function onMove(e)  { if (!isScratching) return; const p = getCanvasPos(e); scratchAt(p.x, p.y); }
    function onUp()     { isScratching = false; }
    function onTouchStart(e) { e.preventDefault(); isScratching = true; const p = getCanvasPos(e); scratchAt(p.x, p.y); }
    function onTouchMove(e)  { e.preventDefault(); if (!isScratching) return; const p = getCanvasPos(e); scratchAt(p.x, p.y); }

    // ─── Check % revealed ─────────────────────────────────────────────────────
    function checkRevealPercentage() {
      if (isFullyRevealed || !scratchCtx) return;
      const pixels = scratchCtx.getImageData(0, 0, scratchCanvas.width, scratchCanvas.height).data;
      let transparent = 0;
      for (let i = 3; i < pixels.length; i += 4) {
        if (pixels[i] < 128) transparent++;
      }
      const pct = transparent / (scratchCanvas.width * scratchCanvas.height);
      if (pct > 0.65) {
        triggerFullReveal();
      }
    }

    // ─── Full reveal ──────────────────────────────────────────────────────────
    function triggerFullReveal() {
      if (isFullyRevealed) return;
      isFullyRevealed = true;

      clearInterval(revealCheckInterval);

      // Fade out canvas
      scratchCanvas.classList.add('revealed');
      hide(scratchHint);
      show(revealedBadge);

      // Confetti burst
      launchConfetti();

      // Mark in Firestore
      if (currentCardId) {
        db.collection('cards').doc(currentCardId).update({
          status: 'revealed',
          revealedAt: firebase.firestore.FieldValue.serverTimestamp()
        }).catch(console.error);
      }
    }

    // ─── Request a card ───────────────────────────────────────────────────────
    async function sendRequest() {
      btnRequest.disabled = true;
      try {
        await db.collection('config').doc('app').set({
          requestPending: true,
          requestedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
      } catch (err) {
        console.error(err);
        btnRequest.disabled = false;
      }
    }

    // ─── Confetti ─────────────────────────────────────────────────────────────
    function launchConfetti() {
      const container = document.getElementById('confettiContainer');
      const colours = ['#c9a84c', '#e8d5a3', '#fff5d6', '#8b6914', '#f0ead6'];
      for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.top  = '-10px';
        piece.style.background = colours[Math.floor(Math.random() * colours.length)];
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        piece.style.width  = (Math.random() * 8 + 4) + 'px';
        piece.style.height = (Math.random() * 8 + 4) + 'px';
        piece.style.opacity = Math.random() * 0.8 + 0.2;
        const duration = (Math.random() * 2 + 1.5).toFixed(2) + 's';
        piece.style.animation = `confettiFall ${duration} ${(Math.random() * 0.5).toFixed(2)}s ease-in forwards`;
        container.appendChild(piece);
        setTimeout(() => piece.remove(), 4000);
      }
    }

    // ─── Resize canvas if window resizes ─────────────────────────────────────
    window.addEventListener('resize', () => {
      if (currentCardId && !isFullyRevealed) {
        initCanvas();
      }
    });

    // ─── Service worker ───────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(console.error);
    }

    // ─── Boot ─────────────────────────────────────────────────────────────────
    startListening();
  </script>
</body>
</html>
